services:
  intellcrop_postgis:
    image: postgis/postgis:16-3.4
    container_name: intellcrop_postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: intellcrop
      POSTGRES_USER: intellcrop
      POSTGRES_PASSWORD: intellcrop_local_password
    ports:
      - "5433:5432"
    volumes:
      - intellcrop_postgis_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

volumes:
  intellcrop_postgis_data: